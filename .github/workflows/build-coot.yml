name: Build Coot

on:
  workflow_dispatch:
  push:
    paths:
      - 'GPhL_script/dl_and_build_coot_cv-20260319.sh'
      - '.github/workflows/build-coot.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    #timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            container: ubuntu:24.04
          - distro: ubuntu-26.04
            container: ubuntu:26.04
          - distro: debian-13
            container: debian:trixie
          - distro: fedora-43
            container: fedora:43
          - distro: archlinux
            container: archlinux:latest
          - distro: rocky-9
            container: rockylinux:9
          # - distro: opensuse-leap-15
          #   container: opensuse/leap:15
          # todo: almalinux
          #- distro: fedora-44
          #  container: fedora:44

    container:
      image: ${{ matrix.container }}

    steps:
      - name: Install git, tar, zstd
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y git tar zstd
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y git tar zstd
          elif command -v zypper >/dev/null 2>&1; then
            zypper install -y git tar zstd
          elif command -v pacman >/dev/null 2>&1; then
            pacman -Sy --noconfirm --needed git tar zstd
          fi

      - uses: actions/checkout@v4

      - name: Build Coot
        run: |
          mkdir -p $GITHUB_WORKSPACE/coot-build
          cd $GITHUB_WORKSPACE/coot-build
          bash $GITHUB_WORKSPACE/GPhL_script/dl_and_build_coot_cv-20260319.sh -os -distributable -noninteractive

      - name: Collect build logs on failure
        if: failure()
        run: bash -c "cd $GITHUB_WORKSPACE/coot-build && shopt -s nullglob && tar --zstd -cf build-logs.tar.zst {deps,build}/*/*.log* {build,deps}/*.log* coot*/*.log* coot*/chapi-build/*.log*"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.distro }}
          path: ${{ github.workspace }}/coot-build/build-logs.tar.zst
          if-no-files-found: warn

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: coot-${{ matrix.distro }}-x86_64
          path: ${{ github.workspace }}/coot-build/coot-*.tar.gz
          if-no-files-found: error
